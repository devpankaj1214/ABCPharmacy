<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Pharmacy - Medicine Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>ABC Pharmacy HR</h1>
            <p>Medicine Inventory Management</p>
        </header>

        <main>
            <section class="controls-section">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search medicine by name..." />
                    <button id="searchBtn" class="btn primary-btn">Search</button>
                    <button id="resetBtn" class="btn secondary-btn">Reset</button>
                </div>
                <button id="addMedicineBtn" class="btn success-btn">Add New Medicine</button>
            </section>

            <section class="grid-section">
                <table class="medicine-grid">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Brand</th>
                            <th>Notes</th>
                            <th>Expiry Date</th>
                            <th>Stock</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="medicineTableBody">
                        <!-- Medicine rows injected here -->
                    </tbody>
                </table>
                <div id="emptyState" class="empty-state hidden">
                    No medicines found.
                </div>
            </section>
        </main>
    </div>

    <!-- Add Medicine Modal -->
    <div id="addModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="closeAddModal">&times;</span>
            <h2>Add Medicine</h2>
            <form id="addMedicineForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required>
                </div>
                <div class="form-group">
                    <label for="brand">Brand</label>
                    <input type="text" id="brand" required>
                </div>
                <div class="form-group">
                    <label for="notes">Notes</label>
                    <input type="text" id="notes">
                </div>
                <div class="form-group">
                    <label for="expiryDate">Expiry Date</label>
                    <input type="date" id="expiryDate" required>
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" min="1" required>
                </div>
                <div class="form-group">
                    <label for="price">Price ($)</label>
                    <input type="number" id="price" step="0.01" min="0" required>
                </div>
                <button type="submit" class="btn primary-btn w-100">Save Medicine</button>
            </form>
        </div>
    </div>

    <!-- Edit Medicine Modal -->
    <div id="editModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="closeEditModal">&times;</span>
            <h2>Edit Medicine</h2>
            <form id="editMedicineForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label for="editFullName">Full Name</label>
                    <input type="text" id="editFullName" required>
                </div>
                <div class="form-group">
                    <label for="editBrand">Brand</label>
                    <input type="text" id="editBrand" required>
                </div>
                <div class="form-group">
                    <label for="editNotes">Notes</label>
                    <input type="text" id="editNotes">
                </div>
                <div class="form-group">
                    <label for="editExpiryDate">Expiry Date</label>
                    <input type="date" id="editExpiryDate" required>
                </div>
                <div class="form-group">
                    <label for="editQuantity">Quantity</label>
                    <input type="number" id="editQuantity" min="0" required>
                </div>
                <div class="form-group">
                    <label for="editPrice">Price ($)</label>
                    <input type="number" id="editPrice" step="0.01" min="0" required>
                </div>
                <button type="submit" class="btn success-btn w-100">Save Changes</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
